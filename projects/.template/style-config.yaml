# Style Configuration for this project
# Reference: /style-guide for full style details

primary_style: ""          # e.g. "japandi", "indochine", "scandinavian"
secondary_style: ""        # optional blend style

color_palette:
  primary: ""              # e.g. "#F5F0EB"
  secondary: ""
  accent: ""
  neutrals: []

materials:
  - ""                     # e.g. "light oak wood", "white marble", "linen"

lighting:
  mood: ""                 # warm / cool / natural / dramatic
  time_of_day: ""          # morning / afternoon / golden hour / evening

photography:
  camera_angle: ""         # eye-level / low angle / bird's eye
  lens: ""                 # wide / normal / telephoto
  depth_of_field: ""       # shallow / deep

providers:
  preferred: []            # e.g. ["gemini", "flux"]
  negative_prompts: ""     # global negative prompts for this project

quality:
  resolution: "1024x1024"
  photorealism: "high"     # low / medium / high / ultra
