<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 340" font-family="'SF Pro Display', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="rg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#94a3b8"/>
      <stop offset="100%" style="stop-color:#64748b"/>
    </linearGradient>
    <linearGradient id="rg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fb923c"/>
      <stop offset="100%" style="stop-color:#ea580c"/>
    </linearGradient>
    <linearGradient id="rg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <filter id="rshadow" x="-10%" y="-10%" width="130%" height="150%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00000015"/>
    </filter>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#cbd5e1"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="520" height="340" fill="#fafafa" rx="16"/>

  <!-- Title -->
  <text x="260" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#1e293b" letter-spacing="-0.5">Iterative Refinement</text>

  <!-- Card 1: Feedback (top left) -->
  <g filter="url(#rshadow)">
    <rect x="40" y="80" width="160" height="80" rx="16" fill="url(#rg1)"/>
    <text x="120" y="116" text-anchor="middle" font-size="14" font-weight="600" fill="white">Feedback</text>
    <text x="120" y="136" text-anchor="middle" font-size="11" fill="white" opacity="0.7">User input</text>
  </g>

  <!-- Card 2: /refine (top right) -->
  <g filter="url(#rshadow)">
    <rect x="320" y="80" width="160" height="80" rx="16" fill="url(#rg2)"/>
    <text x="400" y="116" text-anchor="middle" font-size="14" font-weight="600" fill="white">refine</text>
    <text x="400" y="136" text-anchor="middle" font-size="11" fill="white" opacity="0.7">Improve prompt</text>
  </g>

  <!-- Card 3: /render (bottom center) -->
  <g filter="url(#rshadow)">
    <rect x="180" y="220" width="160" height="80" rx="16" fill="url(#rg3)"/>
    <text x="260" y="256" text-anchor="middle" font-size="14" font-weight="600" fill="white">render</text>
    <text x="260" y="276" text-anchor="middle" font-size="11" fill="white" opacity="0.7">Generate image</text>
  </g>

  <!-- Arrow: Feedback → /refine -->
  <line x1="205" y1="120" x2="314" y2="120" stroke="#cbd5e1" stroke-width="2" stroke-linecap="round" marker-end="url(#arrowhead)"/>

  <!-- Arrow: /refine → /render -->
  <path d="M 400 165 Q 400 200 345 225" stroke="#cbd5e1" stroke-width="2" fill="none" stroke-linecap="round" marker-end="url(#arrowhead)"/>

  <!-- Arrow: /render → Feedback (return loop) -->
  <path d="M 175 260 Q 40 260 40 200 Q 40 165 45 165" stroke="#cbd5e1" stroke-width="2" fill="none" stroke-linecap="round" stroke-dasharray="6,4" marker-end="url(#arrowhead)"/>

  <!-- "not satisfied" label on return arrow -->
  <rect x="30" y="198" width="90" height="22" rx="6" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="75" y="213" text-anchor="middle" font-size="10" fill="#94a3b8">not satisfied</text>
</svg>