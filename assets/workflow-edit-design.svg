<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 280" font-family="'SF Pro Display', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="eg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#94a3b8"/>
      <stop offset="100%" style="stop-color:#64748b"/>
    </linearGradient>
    <linearGradient id="eg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2dd4bf"/>
      <stop offset="100%" style="stop-color:#0d9488"/>
    </linearGradient>
    <linearGradient id="eg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <filter id="eshadow" x="-10%" y="-10%" width="130%" height="150%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00000015"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="720" height="280" fill="#fafafa" rx="16"/>

  <!-- Title -->
  <text x="360" y="45" text-anchor="middle" font-size="22" font-weight="700" fill="#1e293b" letter-spacing="-0.5">Edit Design Workflow</text>

  <!-- Card 1: Reference Image -->
  <g filter="url(#eshadow)">
    <rect x="60" y="80" width="170" height="90" rx="16" fill="url(#eg1)"/>
    <text x="145" y="120" text-anchor="middle" font-size="14" font-weight="600" fill="white">Reference Image</text>
    <text x="145" y="140" text-anchor="middle" font-size="11" fill="white" opacity="0.7">Your photo input</text>
  </g>

  <!-- Arrow 1 -->
  <line x1="235" y1="125" x2="270" y2="125" stroke="#cbd5e1" stroke-width="2" stroke-linecap="round"/>
  <polygon points="270,121 280,125 270,129" fill="#cbd5e1"/>

  <!-- Card 2: /edit-design -->
  <g filter="url(#eshadow)">
    <rect x="282" y="80" width="170" height="90" rx="16" fill="url(#eg2)"/>
    <text x="367" y="120" text-anchor="middle" font-size="14" font-weight="600" fill="white">edit-design</text>
    <text x="367" y="140" text-anchor="middle" font-size="11" fill="white" opacity="0.7">Analyze &amp; diff</text>
  </g>

  <!-- Arrow 2 -->
  <line x1="457" y1="125" x2="492" y2="125" stroke="#cbd5e1" stroke-width="2" stroke-linecap="round"/>
  <polygon points="492,121 502,125 492,129" fill="#cbd5e1"/>

  <!-- Card 3: /render -->
  <g filter="url(#eshadow)">
    <rect x="504" y="80" width="170" height="90" rx="16" fill="url(#eg3)"/>
    <text x="589" y="120" text-anchor="middle" font-size="14" font-weight="600" fill="white">render</text>
    <text x="589" y="140" text-anchor="middle" font-size="11" fill="white" opacity="0.7">Generate image</text>
  </g>

  <!-- Pipeline label -->
  <rect x="180" y="200" width="370" height="36" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="365" y="223" text-anchor="middle" font-size="12" fill="#64748b">scene inventory  →  change diff  →  targeted prompt</text>
</svg>