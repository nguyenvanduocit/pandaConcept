<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 340" font-family="'SF Pro Display', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <linearGradient id="g3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="g4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="g5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fb7185"/>
      <stop offset="100%" style="stop-color:#e11d48"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="150%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00000015"/>
    </filter>
    <filter id="shadow-sm" x="-10%" y="-10%" width="130%" height="150%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000010"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="340" fill="#fafafa" rx="16"/>

  <!-- Title -->
  <text x="480" y="45" text-anchor="middle" font-size="22" font-weight="700" fill="#1e293b" letter-spacing="-0.5">New Design Workflow</text>

  <!-- Cards -->
  <!-- 1: /design-consult -->
  <g filter="url(#shadow)">
    <rect x="30" y="80" width="150" height="90" rx="16" fill="url(#g1)"/>
    <text x="105" y="120" text-anchor="middle" font-size="13" font-weight="600" fill="white" opacity="0.85">design-consult</text>
    <text x="105" y="140" text-anchor="middle" font-size="11" fill="white" opacity="0.65">Gather requirements</text>
  </g>

  <!-- Arrow 1 -->
  <line x1="185" y1="125" x2="215" y2="125" stroke="#cbd5e1" stroke-width="2" stroke-linecap="round"/>
  <polygon points="215,121 223,125 215,129" fill="#cbd5e1"/>
  <text x="204" y="115" text-anchor="middle" font-size="9" fill="#94a3b8">design brief</text>

  <!-- 2: /mood-board -->
  <g filter="url(#shadow)">
    <rect x="225" y="80" width="150" height="90" rx="16" fill="url(#g2)"/>
    <text x="300" y="120" text-anchor="middle" font-size="13" font-weight="600" fill="white" opacity="0.85">mood-board</text>
    <text x="300" y="140" text-anchor="middle" font-size="11" fill="white" opacity="0.65">Build concept</text>
  </g>

  <!-- Arrow 2 -->
  <line x1="380" y1="125" x2="410" y2="125" stroke="#cbd5e1" stroke-width="2" stroke-linecap="round"/>
  <polygon points="410,121 418,125 410,129" fill="#cbd5e1"/>
  <text x="399" y="115" text-anchor="middle" font-size="9" fill="#94a3b8">sensory concept</text>

  <!-- 3: /generate-prompt -->
  <g filter="url(#shadow)">
    <rect x="420" y="80" width="150" height="90" rx="16" fill="url(#g3)"/>
    <text x="495" y="120" text-anchor="middle" font-size="13" font-weight="600" fill="white" opacity="0.85">generate-prompt</text>
    <text x="495" y="140" text-anchor="middle" font-size="11" fill="white" opacity="0.65">Optimize for providers</text>
  </g>

  <!-- Arrow 3 -->
  <line x1="575" y1="125" x2="605" y2="125" stroke="#cbd5e1" stroke-width="2" stroke-linecap="round"/>
  <polygon points="605,121 613,125 605,129" fill="#cbd5e1"/>
  <text x="594" y="115" text-anchor="middle" font-size="9" fill="#94a3b8">optimized prompts</text>

  <!-- 4: /render -->
  <g filter="url(#shadow)">
    <rect x="615" y="80" width="150" height="90" rx="16" fill="url(#g4)"/>
    <text x="690" y="120" text-anchor="middle" font-size="13" font-weight="600" fill="white" opacity="0.85">render</text>
    <text x="690" y="140" text-anchor="middle" font-size="11" fill="white" opacity="0.65">Send to AI providers</text>
  </g>

  <!-- Arrow 4 -->
  <line x1="770" y1="125" x2="800" y2="125" stroke="#cbd5e1" stroke-width="2" stroke-linecap="round"/>
  <polygon points="800,121 808,125 800,129" fill="#cbd5e1"/>
  <text x="789" y="115" text-anchor="middle" font-size="9" fill="#94a3b8">rendered images</text>

  <!-- 5: /compare-models -->
  <g filter="url(#shadow)">
    <rect x="810" y="80" width="150" height="90" rx="16" fill="url(#g5)"/>
    <text x="885" y="120" text-anchor="middle" font-size="13" font-weight="600" fill="white" opacity="0.85">compare-models</text>
    <text x="885" y="140" text-anchor="middle" font-size="11" fill="white" opacity="0.65">Evaluate outputs</text>
  </g>

  <!-- Step numbers -->
  <circle cx="55" cy="185" r="12" fill="#34d399" opacity="0.15"/>
  <text x="55" y="189" text-anchor="middle" font-size="11" font-weight="600" fill="#059669">1</text>
  <circle cx="250" cy="185" r="12" fill="#f59e0b" opacity="0.15"/>
  <text x="250" y="189" text-anchor="middle" font-size="11" font-weight="600" fill="#d97706">2</text>
  <circle cx="445" cy="185" r="12" fill="#3b82f6" opacity="0.15"/>
  <text x="445" y="189" text-anchor="middle" font-size="11" font-weight="600" fill="#2563eb">3</text>
  <circle cx="640" cy="185" r="12" fill="#7c3aed" opacity="0.15"/>
  <text x="640" y="189" text-anchor="middle" font-size="11" font-weight="600" fill="#6d28d9">4</text>
  <circle cx="835" cy="185" r="12" fill="#e11d48" opacity="0.15"/>
  <text x="835" y="189" text-anchor="middle" font-size="11" font-weight="600" fill="#be123c">5</text>

  <!-- Dotted progress line -->
  <line x1="70" y1="185" x2="230" y2="185" stroke="#e2e8f0" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="265" y1="185" x2="425" y2="185" stroke="#e2e8f0" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="460" y1="185" x2="620" y2="185" stroke="#e2e8f0" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="655" y1="185" x2="815" y2="185" stroke="#e2e8f0" stroke-width="1.5" stroke-dasharray="4,4"/>
</svg>